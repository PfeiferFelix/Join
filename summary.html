<!doctype html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" type="image/svg+xml" href="assets/logos/favicon.svg" />
        <link rel="stylesheet" href="style.css" />
        <link rel="stylesheet" href="styles/variable.css" />
        <link rel="stylesheet" href="styles/fonts.css" />
        <link rel="stylesheet" href="styles/summary.css" />
        <script src="script.js"></script>
        <script src="scripts/templates.js"></script>
        <script src="scripts/summary.js"></script>
        <title>Summary</title>
    </head>
    <body onload="(init(), initSummary())">
        <div class="content__container fs-small-regular">
            <aside id="js-sidebar" class="sidebar fc-lightgrey"></aside>

            <div class="header-main__container">
                <header id="js-header" class="header"></header>
                <main class="main-content">
                    <section class="headline1">
                        <h1 class="fs-xxlarge-bold headline1__title-responsive fs-xlarge-bold-responsive">Join 360</h1>
                        <div class="headline1__separator"></div>
                        <span class="fs-large-regular fc-grey fs-medium-regular-responsive">Key Metrics at a Glance</span>
                    </section>

                    <section class="summary">
                        <section class="tasks">
                            <a href="boards.html" class="tasks__to-do tasks__cells--responsive">
                                <div class="tasks__to-do-imgs">
                                    <img class="tasks__icon tasks__to-do-icon" src="assets/icons/summary/inactive/todo.svg" alt="" />
                                    <img class="tasks__icon tasks__to-do-icon--inverted" src="assets/icons/summary/active/todo-active.svg" alt="" />
                                </div>
                                <div class="tasks__to-do-count">
                                    <span id="js-to-do-count" class="fs-xxxlarge-bold fs-xlarge-bold-responsive"></span>
                                    <span class="fs-medium-regular fc-grey fs-small-regular-responsive">To-do</span>
                                </div>
                            </a>
                            <a href="boards.html" class="tasks__done tasks__cells--responsive">
                                <div class="tasks__done-imgs">
                                    <img class="tasks__icon tasks__done-icon" src="assets/icons/summary/inactive/done.svg" alt="" />
                                    <img class="tasks__icon tasks__done-icon--inverted" src="assets/icons/summary/active/done-active.svg" alt="" />
                                </div>
                                <div class="tasks__done-count">
                                    <span id="js-done-count" class="fs-xxxlarge-bold fs-xlarge-bold-responsive"></span>
                                    <span class="fs-medium-regular fc-grey fs-small-regular-responsive">Done</span>
                                </div>
                            </a>
                            <a href="boards.html" class="tasks__urgent tasks__cells--responsive">
                                <div class="tasks__icon-wrapper">
                                    <img class="tasks__icon" src="assets/icons/summary/deadline.svg" alt="" />
                                    <div class="tasks__urgent-count">
                                        <span id="js-urgent-count" class="fs-xxxlarge-bold fs-xlarge-bold-responsive"></span>
                                        <span class="fs-medium-regular fc-grey fs-small-regular-responsive">Urgent</span>
                                    </div>
                                </div>
                                <div class="tasks__separator"></div>
                                <div class="tasks__deadline-date">
                                    <span id="js-deadline-date" class="fs-medium-bold fc-grey">October 16, 2022</span>
                                    <span class="fs-small-regular fc-grey">Upcoming Deadline</span>
                                </div>
                            </a>
                            <a href="boards.html" class="tasks__in-board tasks__cells--responsive">
                                <span id="js-tasks-in-board" class="fs-xxxlarge-bold fs-xlarge-bold-responsive"></span>
                                <span class="fs-medium-regular fc-grey fs-small-regular-responsive"
                                    >Tasks in <br />
                                    Board</span
                                >
                            </a>
                            <a href="boards.html" class="tasks__in-progress tasks__cells--responsive">
                                <span id="js-tasks-in-progress-count" class="fs-xxxlarge-bold fs-xlarge-bold-responsive">2</span>
                                <span class="fs-medium-regular fc-grey fs-small-regular-responsive"
                                    >Tasks In <br />
                                    Progress</span
                                >
                            </a>
                            <a href="boards.html" class="tasks__awaiting-feedback tasks__cells--responsive">
                                <span id="js-awaiting-feedback" class="fs-xxxlarge-bold fs-xlarge-bold-responsive"></span>
                                <span class="fs-medium-regular fc-grey fs-small-regular-responsive"
                                    >Awaiting <br />
                                    Feedback</span
                                >
                            </a>
                        </section>

                        <section id="js-welcoming" class="welcoming">
                            <div id="js-welcoming-greeting" class="welcoming__greeting fs-xlarge-medium fs-large2-regular-responsive">
                                <span id="js-greeting-morning">Good morning</span>
                            </div>
                            <div id="js-greeting-name" class="welcoming__greeting-name fs-xxxlarge-bold fc-lightblue fs-xlarge-bold-responsive" lang="de"></div>
                        </section>
                    </section>
                </main>
            </div>
        </div>
    </body>
</html>
