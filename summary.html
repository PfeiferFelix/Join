<!doctype html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="style.css" />
        <link rel="stylesheet" href="styles/variable.css" />
        <link rel="stylesheet" href="styles/fonts.css" />
        <link rel="stylesheet" href="styles/summary.css" />
        <script src="script.js"></script>
        <title>Summary</title>
    </head>
    <body>
        <div class="content__container fs-small-regular">
            <aside class="sidebar fc-lightgrey">
                <img class="sidebar__logo" src="assets/logos/logo.svg" alt="" />
                <nav class="sidebar__nav">
                    <ul class="sidebar__nav-list">
                        <li class="sidebar__list-item">
                            <a class="sidebar__nav-link sidebar__link--active" href="#"><img class="sidebar__nav-img" src="assets/icons/sidebar/active/summary-active.svg" alt="" /> <span>Summary</span></a>
                        </li>
                        <li class="sidebar__list-item">
                            <a class="sidebar__nav-link" href="add-task.html"
                                ><img class="sidebar__nav-img" src="assets/icons/sidebar/inactive/add-task.svg" alt="" />
                                <span>Add Task</span>
                            </a>
                        </li>
                        <li class="sidebar__list-item">
                            <a class="sidebar__nav-link" href="boards.html"><img class="sidebar__nav-img" src="assets/icons/sidebar/inactive/board.svg" alt="" /> <span>Boards</span></a>
                        </li>
                        <li class="sidebar__list-item">
                            <a class="sidebar__nav-link" href="contacts.html"><img class="sidebar__nav-img" src="assets/icons/sidebar/inactive/contacts.svg" alt="" /> <span>Contacts</span></a>
                        </li>
                    </ul>
                </nav>

                <footer class="sidebar__legal-information">
                    <a class="sidebar__legal-information-link" href="privacy-policy.html">Privacy Policy</a>
                    <a class="sidebar__legal-information-link" href="legal-notice.html">Legal Notice</a>
                </footer>
            </aside>

            <div class="header-main__container">
                <header class="header">
                    <h3 class="header__headline3">Kanban Project Management Tool</h3>
                    <div class="header__user-interaction-container">
                        <button><img src="assets/icons/header/help.svg" alt="" /></button>
                        <button class="header__user-button">
                            <img class="header__ellipse" src="assets/icons/header/ellipse.svg" alt="" />
                            <span class="header__name-abbreviation">DG</span>
                        </button>
                    </div>
                </header>
                <main class="main-content">
                    <section class="headline">
                        <h1>Join 360</h1>
                        <div class="headline__separator"></div>
                        <span class="fs-large-regular fc-grey">Key Metrics at a Glance</span>
                    </section>

                    <section class="summary">
                        <div class="tasks">
                            <a href="boards.html" class="tasks__to-do">
                                <img class="tasks__icon tasks__to-do-icon" src="assets/icons/summary/inactive/todo.svg" alt="" />
                                <img class="tasks__icon tasks__to-do-icon--inverted" src="assets/icons/summary/active/todo-active.svg" alt="" />
                                <div class="tasks__to-do-count">
                                    <span class="fs-xxlarge-bold">1</span>
                                    <span class="fs-medium-regular fc-grey">To-do</span>
                                </div>
                            </a>
                            <a href="boards.html" class="tasks__done">
                                <img class="tasks__icon tasks__done-icon" src="assets/icons/summary/inactive/done.svg" alt="" />
                                <img class="tasks__icon tasks__done-icon--inverted" src="assets/icons/summary/active/done-active.svg" alt="" />
                                <div class="tasks__done-count">
                                    <span class="fs-xxlarge-bold">1</span>
                                    <span class="fs-medium-regular fc-grey">Done</span>
                                </div>
                            </a>
                            <a href="boards.html" class="tasks__urgent">
                                <div class="tasks__icon-wrapper">
                                    <img class="tasks__icon" src="assets/icons/summary/deadline.svg" alt="" />
                                    <div class="tasks__urgent-count">
                                        <span class="fs-xxlarge-bold">1</span>
                                        <span class="fs-medium-regular fc-grey">Urgent</span>
                                    </div>
                                </div>
                                <div class="tasks__separator"></div>
                                <div class="tasks__deadline-date">
                                    <span class="fs-medium-bold fc-grey">October 16, 2022</span>
                                    <span class="fs-small-regular fc-grey">Upcoming Deadline</span>
                                </div>
                            </a>
                            <a href="boards.html" class="tasks__in-board">
                                <span class="fs-xxlarge-bold">5</span>
                                <span class="fs-medium-regular fc-grey"
                                    >Tasks in <br />
                                    Board</span
                                >
                            </a>
                            <a href="boards.html" class="tasks__in-progress">
                                <span class="fs-xxlarge-bold">2</span>
                                <span class="fs-medium-regular fc-grey"
                                    >Tasks In <br />
                                    Progress</span
                                >
                            </a>
                            <a href="boards.html" class="tasks__awaiting-feedback">
                                <span class="fs-xxlarge-bold">1</span>
                                <span class="fs-medium-regular fc-grey"
                                    >Awaiting <br />
                                    Feedback</span
                                >
                            </a>
                        </div>

                        <div class="welcoming">
                            <h2 class="fs-xlarge-medium">
                                Good morning,<br />
                                <span class="fs-xxlarge-bold fc-lightblue">Sofia Müller</span>
                            </h2>
                        </div>
                    </section>
                </main>
            </div>
        </div>
    </body>
</html>
