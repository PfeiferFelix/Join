<!doctype html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" type="image/svg+xml" href="assets/logos/favicon.svg" />
        <title>Join-Login</title>
        <link rel="stylesheet" href="styles/fonts.css" />
        <link rel="stylesheet" href="styles/registrations.css" />
    </head>

    <body>
        <header>
            <img src="./assets/logos/logo_dark.jpg" alt="Join" class="logo" />
            <div class="header__right">
                <span class="noUser">Not a Join user yet?</span>
                <a href="registration.html" class="buttonRegistration fs-small-regular">Sign up</a>
            </div>
        </header>
        <main>
            <div class="container">
                <h1 class="fs-xlarge-medium">Log in</h1>
                <div class="title__underline"></div>
                <form class="login__form">
                    <div class="input__wrapper">
                        <input id="email" type="email" placeholder="Email" required />
                        <img src="assets/login/mail.png" alt="Email" class="input__icon" />
                    </div>
                    <div class="input__wrapper">
                        <input id="password" type="password" placeholder="Password" required />
                        <img src="assets/login/lock.png" alt="Password" class="input__icon" />
                    </div>
                    <div class="button__row">
                        <button onclick="loginUser()" type="button" class="Login__btn fs-small-regular">Log in</button>
                        <button onclick="guestLogin()" type="button" class="GuestLogin__btn fs-small-regular">Gast Log in</button>
                    </div>
                </form>
            </div>
            <div class="mobile-signup">
                <span class="noUser">Noch kein Join User?</span>
                <a href="registration.html" class="buttonRegistration fs-small-regular">Registrieren</a>
            </div>
        </main>
        <footer>
            <a class="footer__Link" href="privacy-policy.html">Privacy Policy</a>
            <a class="footer__Link" href="legal-notice.html">Legal Notice</a>
        </footer>
        <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
        <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <script src="scripts/login.js"></script>
    </body>
</html>
