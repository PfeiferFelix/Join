<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join-Login</title>
    <link rel="stylesheet" href="styles/font.css">
    <link rel="stylesheet" href="styles/registrations.css">
</head>

<body>
    <header>
        <img src="./assets/logos/logo_dark.jpg" alt="logo" class="logo">
        <div class="header-right">
            <span>Noch kein Join User?</span>
            <a href="registration.html" class="buttonRegistration">Registrieren</a>
        </div>
    </header>
    <main>
        <div class="container">
            <h1>Log in</h1>
            <div class="title-underline"></div>
            <form class="login-form">
                <div class="input-wrapper">
                    <input type="email" placeholder="Email" required>
                    <img src="./assets/icons/mail.png" alt="mail icon" class="input-icon">
                </div>
                <div class="input-wrapper">
                    <input type="password" placeholder="Password" required>
                    <img src="./assets/icons/lock.png" alt="lock icon" class="input-icon">
                </div>
                <div class="button-row">
                    <button type="submit" class="btnLogin">Log in</button>
                    <button type="button" class="btnGuestLogin">Gast Log in</button>
                </div>
            </form>
        </div>
    </main>
    <footer>
        <a class="footerLink" href="privacy-policy.html">Privacy Policy</a>
        <a class="footerLink" href="legal-notice.html">Legal Notice</a>
    </footer>
</body>

</html>
