<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join-Login</title>
    <link rel="stylesheet" href="styles/fonts.css">
    <link rel="stylesheet" href="styles/registrations.css">
</head>

<body>
    <header>
        <img src="./assets/logos/logo_dark.jpg" alt="logo" class="logo">
        <div class="header__right">
            <span class="noUser">Not a Join user yet?</span>
            <a href="registration.html" class="buttonRegistration">Sign up</a>
        </div>
    </header>
    <main>
        <div class="container">
            <h1>Log in</h1>
            <div class="title__underline"></div>
            <form class="login__form">
                <div class="input__wrapper">
                    <input id="email" type="email" placeholder="Email" required>
                    <img src="./assets/icons/mail.png" alt="mail icon" class="input__icon">
                </div>
                <div class="input__wrapper">
                    <input id="password" type="password" placeholder="Password" required>
                    <img src="./assets/icons/lock.png" alt="lock icon" class="input__icon">
                </div>
                <div class="button__row">
                    <button onclick="loginUser()" type="button" class="Login__btn">Log in</button>
                    <button onclick="guestLogin()" type="button" class="GuestLogin__btn">Gast Log in</button>
                </div>
            </form>
        </div>
        <div class="mobile-signup">
            <span class="noUser">Noch kein Join User?</span>
            <a href="registration.html" class="buttonRegistration">Registrieren</a>
        </div>
    </main>
    <footer>
        <a class="footer__Link" href="privacy-policy.html">Privacy Policy</a>
        <a class="footer__Link" href="legal-notice.html">Legal Notice</a>
    </footer>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="scripts/login.js"></script>
</body>

</html>
