<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="styles/variable.css" />
    <link rel="stylesheet" href="styles/fonts.css" />
    <script src="script.js"></script>
    <link rel="stylesheet" href="styles/add-task.css">
    <title>Add Task</title>
</head>

<body>

    <script>
        document.addEventListener('DOMContentLoaded', () => {  // Ensure the DOM is fully loaded before attaching event listeners
            setActivePriority();
            const today = new Date().toISOString().split('T')[0];   // Get today's date in YYYY-MM-DD format for the date input's min attribute
            document.getElementById('due-date').setAttribute('min', today); // Set the minimum date to today to prevent selecting past dates 
        });

        function setActivePriority() {           // Function to handle the active state of priority buttons
            document.querySelectorAll('.priority-buttons__btn').forEach(btn => {    // Select all priority buttons and attach click event listeners to them
                btn.addEventListener('click', () => {                               // When a button is clicked, remove the active class from all buttons and add it to the clicked button
                    document.querySelectorAll('.priority-buttons__btn')             // Select all priority buttons again to remove the active class from them
                        .forEach(b => b.classList.remove('priority-buttons__btn--active')); // Remove the active class from all buttons. This ensures that only one button can be active at a time.
                    btn.classList.add('priority-buttons__btn--active');             // Add the active class to the clicked button to visually indicate that it is selected as the priority level for the task being created.
                });
            });
        }
    </script>

    <div class="content__container fs-small-regular">
        <aside class="sidebar fc-lightgrey">
            <img class="sidebar__logo" src="assets/logos/logo.svg" alt="" />
            <nav class="sidebar__nav">
                <ul class="sidebar__nav-list">
                    <li class="sidebar__list-item">
                        <a class="sidebar__nav-link" href="summary.html"><img class="sidebar__nav-img"
                                src="assets/icons/sidebar/inactive/summary.svg" alt="" /> <span>Summary</span></a>
                    </li>
                    <li class="sidebar__list-item">
                        <a class="sidebar__nav-link sidebar__link--active" href="#"
                                ><img class="sidebar__nav-img"
                                src="assets/icons/sidebar/active/add-task-active.svg" alt="" />
                                <span>Add Task</span>
                            </a>
                    </li>
                    <li class="sidebar__list-item">
                        <a class="sidebar__nav-link" href="boards.html"><img class="sidebar__nav-img" src="assets/icons/sidebar/inactive/board.svg"
                                alt="" /> <span>Boards</span></a>
                    </li>
                    <li class="sidebar__list-item">
                        <a class="sidebar__nav-link" href="contacts.html"><img class="sidebar__nav-img"
                                src="assets/icons/sidebar/inactive/contacts.svg" alt="" /> <span>Contacts</span></a>
                    </li>
                </ul>
            </nav>

                <footer class="sidebar__legal-information">
                    <a class="sidebar__legal-information-link" href="privacy-policy.html">Privacy Policy</a>
                    <a class="sidebar__legal-information-link" href="legal-notice.html">Legal Notice</a>
                </footer>
            </aside>

            <div class="header-main__container">
                <header class="header">
                    <h3 class="header__headline3 fs-medium-regular">Kanban Project Management Tool</h3>
                    <div class="header__user-interaction-container">
                        <button><img src="assets/icons/header/help.svg" alt="" /></button>
                        <button class="header__user-button">
                            <img class="header__ellipse" src="assets/icons/header/ellipse.svg" alt="" />
                            <span class="header__name-abbreviation">DG</span>
                        </button>
                    </div>
                </header>
                <main class="main-content__body">
                <h1 class="main-content__page-title">Add Task</h1>

                <form class="task-form">
                    <div class="task-form__body">
                        <div class="task-form__col task-form__col--left">

                            <label class="task-form__label" for="title">
                                Title <span class="task-form__required">*</span>
                            </label>
                            <input class="task-form__input" type="text" id="title" placeholder="Enter a title" required>

                            <label class="task-form__label" for="description">Description</label>
                            <textarea class="task-form__textarea" id="description"
                                placeholder="Enter a Description"></textarea>

                            <label class="task-form__label" for="due-date">
                                Due date <span class="task-form__required">*</span>
                            </label>
                            <input class="task-form__input" type="date" id="due-date" lang="en" required>

                        </div>

                        <div class="task-form__separator"></div>

                        <div class="task-form__col task-form__col--right">

                            <span class="task-form__label">Priority</span>
                            <div class="priority-buttons">
                                <button type="button" class="priority-buttons__btn priority-buttons__btn--urgent">
                                    Urgent <span class="priority-buttons__icon priority-buttons__icon--up"> ⟪</span>
                                </button>
                                <button type="button" class="priority-buttons__btn priority-buttons__btn--medium">
                                    Medium <span class="priority-buttons__icon"> ‖</span>
                                </button>
                                <button type="button" class="priority-buttons__btn priority-buttons__btn--low">
                                    Low <span class="priority-buttons__icon priority-buttons__icon--down"> ⟪</span>
                                </button>
                            </div>

                            <label class="task-form__label" for="assigned-to">Assigned to</label>
                            <select class="task-form__select" id="assigned-to">
                                <option value="">Select contacts to assign</option>
                            </select>

                            <label class="task-form__label" for="category">
                                Category <span class="task-form__required">*</span>
                            </label>
                            <select class="task-form__select" id="category" required>
                                <option value="">Select task category</option>
                                <option value="technical">Technical Task</option>
                                <option value="user-story">User Story</option>
                            </select>

                            <label class="task-form__label" for="subtask">Subtask</label>
                            <div class="subtask-input">
                                <input class="subtask-input__field" type="text" id="subtask"
                                    placeholder="Add new subtask">
                            </div>

                            <div class="task-form__footer">
                                <div class="task-form__actions">
                                    <button class="task-form__btn task-form__btn--clear" type="reset">Clear</button>
                                    <button class="task-form__btn task-form__btn--submit" type="submit">Create
                                        Task</button>
                                </div>
                            </div>

                        </div>
                    </div>
                </form>
            </main>
</html>
