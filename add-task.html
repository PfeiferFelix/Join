<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" type="image/svg+xml" href="assets/logos/favicon.svg" />
        <link rel="stylesheet" href="style.css" />
        <link rel="stylesheet" href="styles/variable.css" />
        <link rel="stylesheet" href="styles/fonts.css" />
        <link rel="stylesheet" href="styles/add-task-dropdown.css" />
        <link rel="stylesheet" href="styles/add-task-subtask.css" />
        <link rel="stylesheet" href="styles/add-task.css" />
        <script src="script.js"></script>
        <script src="scripts/templates.js"></script>
        <script src="scripts/add-task-dropdown.js"></script>
        <script src="scripts/add-task-subtask.js"></script>
        <script src="./scripts/add-task.js" defer></script>
        <title>Add Task</title>
    </head>

    <body
        onload="
            init();
            initAddTask();
        "
    >
        <div class="content__container fs-small-regular">
            <aside id="js-sidebar" class="sidebar fc-lightgrey"></aside>

            <div class="header-main__container">
                <header id="js-header" class="header"></header>
                <main class="main-content__body main-content">
                    <h1 class="main-content__page-title fs-xxlarge-bold fs-xlarge-bold-responsive">Add Task</h1>

                    <div class="task-form__scroll-area">
                        <form class="task-form" novalidate>
                            <div class="task-form__body">
                                <div class="task-form__col task-form__col--left">
                                    <label class="task-form__label" for="title"> Title <span class="task-form__required">*</span> </label>
                                    <input class="task-form__input" type="text" id="title" placeholder="Enter a title" required />
                                    <span class="task-form__error" id="title-error"></span>

                                    <label class="task-form__label" for="description">Description</label>
                                    <textarea class="task-form__textarea" id="description" placeholder="Enter a Description"></textarea>

                                    <label class="task-form__label" for="due-date"> Due date <span class="task-form__required">*</span> </label>
                                    <input class="task-form__input" type="date" id="due-date" lang="en" required />
                                    <span class="task-form__error" id="due-date-error"></span>
                                </div>

                                <div class="task-form__separator"></div>

                                <div class="task-form__col task-form__col--right">
                                    <span class="task-form__label">Priority</span>
                                    <div class="priority-buttons">
                                        <button type="button" class="priority-buttons__btn priority-buttons__btn--urgent" data-priority="urgent">
                                            <div class="priority-buttons__row">Urgent <img src="assets/icons/Prio alta.svg" alt="urgent" class="priority-buttons__icon" /></div>
                                        </button>
                                        <button type="button" class="priority-buttons__btn priority-buttons__btn--medium" data-priority="medium">
                                            <div class="priority-buttons__row">Medium <img src="assets/icons/Prio media.svg" alt="medium" class="priority-buttons__icon" /></div>
                                        </button>
                                        <button type="button" class="priority-buttons__btn priority-buttons__btn--low" data-priority="low">
                                            <div class="priority-buttons__row">Low <img src="assets/icons/Prio baja.svg" alt="low" class="priority-buttons__icon" /></div>
                                        </button>
                                    </div>

                                    <label class="task-form__label" for="assigned-to">Assigned to</label>
                                    <div class="dropdown" id="assigned-to-dropdown">
                                        <div class="dropdown__trigger">
                                            <input type="text" class="dropdown__search" placeholder="Select contacts to assign" id="assigned-to-search" />
                                            <span class="dropdown__arrow" id="assigned-to-arrow"><img src="assets/icons/arrow_drop_downaa.svg" alt="" /></span>
                                        </div>
                                        <ul class="dropdown__list" id="assigned-to-list"></ul>
                                    </div>
                                    <div class="dropdown__selected-avatars" id="selected-avatars"></div>

                                    <label class="task-form__label" for="category"> Category <span class="task-form__required">*</span> </label>
                                    <select class="task-form__select" id="category" required>
                                        <option value="">Select task category</option>
                                        <option value="technical">Technical Task</option>
                                        <option value="user-story">User Story</option>
                                    </select>
                                    <span class="task-form__error" id="category-error"></span>

                                    <label class="task-form__label" for="subtask">Subtask</label>
                                    <div class="subtask-input">
                                        <input class="subtask-input__field" type="text" id="subtask" placeholder="Add new subtask" />
                                        <button type="button" class="subtask-input__btn subtask-input__btn--clear" id="subtask-clear"><img src="assets/icons/vector.png" alt="clear" /></button>
                                        <div class="subtask-input__separator"></div>
                                        <button type="button" class="subtask-input__btn subtask-input__btn--confirm" id="subtask-confirm"><img src="assets/icons/check grey.svg" alt="confirm" /></button>
                                    </div>
                                    <ul class="subtask-list" id="subtask-list"></ul>
                                    <p class="task-form__required-hint task-form__required-hint--mobile"><span class="task-form__required">*</span>This field is required</p>
                                </div>
                            </div>
                        </form>
                    </div>

                    <div class="task-form__footer">
                        <p class="task-form__required-hint task-form__required-hint--desktop"><span class="task-form__required">*</span>This field is required</p>
                        <div class="task-form__actions">
                            <button class="task-form__btn task-form__btn--clear" type="reset">Clear <img src="assets/icons/iconoir_cancel.svg" alt="" /></button>
                            <button class="task-form__btn task-form__btn--submit" type="submit">Create Task <img src="assets/icons/check.svg" alt="" /></button>
                        </div>
                    </div>

                    <dialog class="toast" id="add__task_toast">
                        Task added to board
                        <img src="assets/sidebar/inactive/boards.svg" alt="Boards" />
                    </dialog>
                </main>
            </div>
        </div>
    </body>
</html>
