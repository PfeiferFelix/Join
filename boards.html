<!doctype html>
<html lang="de">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="assets/icons/board.svg" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="styles/boards.css" />
    <link rel="stylesheet" href="styles/variable.css" />
    <script src="scripts/templates.js"></script>
    <script src="script.js"></script>
    <title>Boards</title>
</head>

<body onload="updateHTML()">
    <div class="container">
        <aside class="sidebar">
            <img class="sidebar__logo" src="assets/logos/logo.svg" alt="" />
            <nav>
                <ul class="sidebar__nav-list">
                    <li class="sidebar__list-item">
                        <a class="sidebar__nav-link" href=""><img class="sidebar__nav-img"
                                src="assets/icons/summary.svg" alt="" />Summary</a>
                    </li>
                    <li class="sidebar__list-item">
                        <a class="sidebar__nav-link" href=""><img class="sidebar__nav-img"
                                src="assets/icons/add-task.svg" alt="" />Add Task</a>
                    </li>
                    <li class="sidebar__list-item">
                        <a class="sidebar__nav-link" href=""><img class="sidebar__nav-img" src="assets/icons/board.svg"
                                alt="" />Boards</a>
                    </li>
                    <li class="sidebar__list-item">
                        <a class="sidebar__nav-link" href=""><img class="sidebar__nav-img"
                                src="assets/icons/contacts.svg" alt="" />Contacts</a>
                    </li>
                </ul>
            </nav>

            <div class="sidebar__legal-information">
                <a class="sidebar__legal-information-link" href="">Privacy Policy</a>
                <a class="sidebar__legal-information-link" href="">Legal Notice</a>
            </div>
        </aside>

        <div class="main-content">
            <header class="header__boards">
                <h1>Kanban Project Management Tool</h1>
                <div class="header__buttons">
                    <button id="help__me" class="help__me" aria-label="Help and support">?</button>
                    <button id="profile__settings" class="profile__settings" aria-label="Profile settings">MM</button>
                </div>
            </header>
            <main>
                <div class="boards__addtask">
                    <h1>Boards</h1>
                    <div class="search-container">
                        <form action="/search" method="get">
                            <input type="text" placeholder="Search.." name="search">
                            <button class="searchBtn" type="submit" title="Search"><i class="fa fa-search"></i></button>
                        </form>
                        <button type="button" class="addTaskBtn">Add Task +</button>
                    </div>
                </div>
                <div class="boards__lists">
                    <div class="toDo" id="toDo_list">
                        <h2>To Do</h2>
                        <button class="toDoBtn" id="toDoBtn" aria-label="Add task to To Do">+</button>
                    </div>

                    <div class="inProgress" id="inProgress_list">
                        <h2>In Progress</h2>
                        <button class="inProgressBtn" id="inProgressBtn" aria-label="Add task to In Progress">+</button>
                    </div>
                    <div class="awaitingFeedback" id="awaitingFeedback_list">
                        <h2>Awaiting Feedback</h2>
                        <button class="awaitingFeedbackBtn" id="awaitingFeedbackBtn" aria-label="Add task to Awaiting Feedback">+</button>
                    </div>

                    <div class="done" id="done_list">
                        <h2>Done</h2>
                        <button class="doneBtn" id="doneBtn" aria-label="Add task to Done">+</button>
                    </div>
                </div>
                <section class="boards__section">
                    <div class="drag-area" id="toDo" ondrop="moveTo('toDo')" ondragleave="removeHighlight('toDo')"
                        ondragover="allowDrop(event); highlight('toDo')"></div>
                    <div class="drag-area" id="inProgress" ondrop="moveTo('inProgress')" ondragleave="removeHighlight('inProgress')"
                        ondragover="allowDrop(event); highlight('inProgress')"></div>
                    <div class="drag-area" id="awaitingFeedback" ondrop="moveTo('awaitingFeedback')" ondragleave="removeHighlight('awaitingFeedback')"
                        ondragover="allowDrop(event); highlight('awaitingFeedback')"></div>
                    <div class="drag-area" id="done" ondrop="moveTo('done')" ondragleave="removeHighlight('done')"
                        ondragover="allowDrop(event); highlight('done')"></div>
                </section>
        </div>
        </main>
    </div>
    </div>
</body>

</html>
