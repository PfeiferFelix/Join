<!doctype html>
<html lang="de">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="assets/logos/favicon.png" />
    <link rel="icon" type="image/svg+xml" href="assets/logos/favicon.svg" />
    <title>Join-Registration</title>
    <link rel="stylesheet" href="styles/fonts.css" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="styles/login-registration.css" />
    <link rel="stylesheet" href="styles/variable.css" />
    <link rel="stylesheet" href="styles/components.css" />
</head>

<body>
    <header>
        <img src="./assets/logos/logo_dark.jpg" alt="Join" class="logo" />
    </header>
    <main>
        <div class="container">
            <div class="title__row">
                <a href="index.html" class="btn-back">
                    <img src="assets/login/arrow-left-line.png" alt="Go back" />
                </a>
                <span class="container__headline fs-xlarge-medium">Sign up</span>
            </div>
            <div class="title__underline"></div>
            <form class="login__form">
                <div class="input__field">
                    <div class="input__wrapper">
                        <input id="name" type="text" placeholder="Name" maxlength="20" />
                        <img src="assets/contacts/person.png" alt="Name" class="input__icon" />
                    </div>
                    <p class="error__text" id="nameError"></p>
                </div>
                <div class="input__field">
                    <div class="input__wrapper">
                        <input id="email" type="text" placeholder="Email" />
                        <img src="assets/login/mail.png" alt="Email" class="input__icon" />
                    </div>
                    <p class="error__text" id="emailError"></p>
                </div>
                <div class="input__field">
                    <div class="input__wrapper">
                        <input id="password" type="password" placeholder="Password" />
                        <button type="button" class="input__icon-btn" aria-label="Show password" aria-pressed="false" onclick="togglePasswordVisibility('password', this)">
                                <img src="assets/login/lock.png" alt="" class="input__icon input__icon--lock" />
                                <svg class="input__icon input__icon--eye" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
                                <svg class="input__icon input__icon--eye-off" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a19.77 19.77 0 0 1 4.22-5.36"/><path d="M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a19.77 19.77 0 0 1-3.16 4.36"/><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                            </button>
                    </div>
                    <p class="error__text" id="passwordFieldError"></p>
                </div>
                <div class="input__field">
                    <div class="input__wrapper" id="passwordconfirmWrapper">
                        <input id="passwordconfirm" type="password" placeholder="Confirm password" />
                        <button type="button" class="input__icon-btn" aria-label="Show password" aria-pressed="false" onclick="togglePasswordVisibility('passwordconfirm', this)">
                                <img src="assets/login/lock.png" alt="" class="input__icon input__icon--lock" />
                                <svg class="input__icon input__icon--eye" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
                                <svg class="input__icon input__icon--eye-off" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a19.77 19.77 0 0 1 4.22-5.36"/><path d="M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a19.77 19.77 0 0 1-3.16 4.36"/><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                            </button>
                    </div>
                    <p class="error__text" id="passwordError"></p>
                </div>
                <div class="checkbox__row">
                    <input type="checkbox" id="privacy" />
                    <label for="privacy">I accept the <a href="privacy-policy.html">Privacy policy</a></label>
                </div>
                <p class="error__text privacy__error" id="privacyError"></p>
                <div class="button__row">
                    <button type="button" onclick="registerUser()" class="btn-primary fs-small-regular">Sign up</button>
                </div>
            </form>
        </div>
    </main>
    <footer>
        <a class="footer__Link link-hover" href="privacy-policy.html">Privacy Policy</a>
        <a class="footer__Link link-hover" href="legal-notice.html">Legal Notice</a>
    </footer>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="scripts/password-toggle.js"></script>
    <script src="scripts/login.js"></script>
</body>

</html>
