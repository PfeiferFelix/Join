<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join-Registration</title>
    <link rel="stylesheet" href="styles/font.css">
    <link rel="stylesheet" href="styles/registrations.css">
</head>

<body>
    <header>
        <img src="./assets/logos/logo_dark.jpg" alt="logo" class="logo">
    </header>
    <main>
        <div class="container">
            <div class="title-row">
                <a href="login.html">
                    <img src="./assets/icons/arrow-left-line.png" alt="back" class="back-arrow">
                </a>
                <h1>Registrieren</h1>
            </div>
            <div class="title-underline"></div>
            <form class="login-form">
                <div class="input-wrapper">
                    <input type="name" placeholder="Name" required>
                    <img src="./assets/icons/person.png" alt="person icon" class="input-icon">
                </div>
                <div class="input-wrapper">
                    <input type="email" placeholder="Email" required>
                    <img src="./assets/icons/mail.png" alt="mail icon" class="input-icon">
                </div>
                <div class="input-wrapper">
                    <input type="password" placeholder="Password" required>
                    <img src="./assets/icons/lock.png" alt="lock icon" class="input-icon">
                </div>
                <div class="input-wrapper">
                    <input type="passwordconfirm" placeholder="Password bestätigen" required>
                    <img src="./assets/icons/lock.png" alt="lock icon" class="input-icon">
                </div>
                <div class="checkbox-row">
                    <input type="checkbox" id="privacy" required>
                    <label for="privacy">Ich akzeptiere die <a href="privacy-policy.html">Privacy policy</a></label>
                </div>
                <div class="button-row">
                    <button type="submit" class="btnLogin">Registrieren</button>
                </div>
            </form>
        </div>
    </main>
    <footer>
        <a class="footerLink" href="privacy-policy.html">Privacy Policy</a>
        <a class="footerLink" href="legal-notice.html">Legal Notice</a>
    </footer>
</body>

</html>
